apiVersion: apps/v1
kind: Deployment
metadata:
  name: notify
  namespace: demo
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: notify
  template:
    metadata:
      labels:
        app.kubernetes.io/name: notify
    spec:
      containers:
        - env:
            - name: OTEL_EP
              value: otel-collector-opentelemetry-collector.monitoring.svc.cluster.local:4317
            - name: LOCATOR_URL
              value: http://locator.demo.svc.cluster.local:3000
            - name: SERVICE_FQDN
              value: notify.demo.svc.cluster.local:3000
          image: ghcr.io/fkouhai/rss_notify-x86_64-linux:1.0.1
          imagePullPolicy: IfNotPresent
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 3
            periodSeconds: 5
          name: notify
          readinessProbe:
            httpGet:
              path: /ready
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
      nodeSelector:
        kubernetes.io/arch: amd64
      securityContext:
        fsGroup: 1000
