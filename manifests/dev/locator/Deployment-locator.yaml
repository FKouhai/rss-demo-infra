apiVersion: apps/v1
kind: Deployment
metadata:
  name: locator
  namespace: demo
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: locator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: locator
    spec:
      containers:
        - env:
            - name: OTEL_EP
              value: signoz-otel-collector.signoz.svc.cluster.local:4317
          image: ghcr.io/fkouhai/rss_locator-x86_64-linux:0.2.1
          imagePullPolicy: IfNotPresent
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 3
            periodSeconds: 5
          name: locator
      securityContext:
        fsGroup: 1000
