apiVersion: apps/v1
kind: Deployment
metadata:
  name: locator
  namespace: demo
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: locator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: locator
    spec:
      containers:
        - env:
            - name: OTEL_EP
              value: otel-collector-opentelemetry-collector.monitoring.svc.cluster.local:4317
          image: ghcr.io/fkouhai/rss_locator-x86_64-linux:1.0.4
          imagePullPolicy: IfNotPresent
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 3
            periodSeconds: 5
          name: locator
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 3
            periodSeconds: 10
      nodeSelector:
        kubernetes.io/arch: amd64
      securityContext:
        fsGroup: 1000
