apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: demo
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frontend
    spec:
      containers:
        - env:
            - name: OTEL_EP
              value: otel-collector-opentelemetry-collector.monitoring.svc.cluster.local:4317
            - name: SERVICE_VERSION
              value: 1.0.5
            - name: LOCATOR_URL
              value: http://locator.demo.svc.cluster.local:3000
          image: ghcr.io/fkouhai/rss_frontend-x86_64-linux:1.0.5
          imagePullPolicy: IfNotPresent
          livenessProbe:
            httpGet:
              path: /api/healthz
              port: 4321
            initialDelaySeconds: 5
            periodSeconds: 10
          name: frontend
          readinessProbe:
            httpGet:
              path: /api/healthz
              port: 4321
            initialDelaySeconds: 5
            periodSeconds: 10
      nodeSelector:
        kubernetes.io/arch: amd64
      securityContext:
        fsGroup: 1000
